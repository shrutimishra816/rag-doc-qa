services:
  - type: web
    name: rag-doc-qa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # You'll paste this manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: CHROMA_DB_DIR
        value: ./chroma_db
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: chroma-storage
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1
